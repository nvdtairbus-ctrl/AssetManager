name: دریافت خودکار قیمت از Bonbast

on:
  schedule:
    # اجرا هر ساعت (دقیقه 0 هر ساعت)
    # فرمت: دقیقه ساعت روز-ماه ماه روز-هفته
    - cron: '0 * * * *'
  # امکان اجرای دستی از طریق GitHub Actions
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # اجازه push به مخزن

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bonbast package
        run: |
          python -m pip install --upgrade pip
          pip install bonbast

      - name: Run fetch script
        run: python fetch_prices.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add prices.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update prices [skip ci]"
          git push