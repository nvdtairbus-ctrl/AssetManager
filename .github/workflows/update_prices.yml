name: دریافت خودکار قیمت از Bonbast

on:
  schedule:
    - cron: '*/15 * * * *'   # هر 15 دقیقه یکبار
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          pip install bonbast
      - name: Run script
        run: python fetch_prices.py
      - name: Commit
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add prices.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update prices [skip ci]"
          git push