workflows:
  # برای توسعه و تست روزانه (Development Client)
  android-dev-client:
    name: Android Development Client
    max_build_duration: 60
    environment:
      node: 20
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Prebuild Expo project
        script: npx expo prebuild --platform android --clean
      - name: Build Debug APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/**/*.apk

  # برای ساخت نسخه نهایی (Production APK)
  android-production:
    name: Android Production Build
    max_build_duration: 60
    environment:
      node: 20
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Prebuild Expo project
        script: npx expo prebuild --platform android --clean
      - name: Build Release APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/**/*.apk